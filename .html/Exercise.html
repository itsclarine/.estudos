  <style>
    .subscribe-{
      background-color: rgb(161, 38, 38);
      color: white;
      border: none; /* deixar sem borda */
      height: 36px; /* altura */
      width: 105px ; /*largura */
      border-radius: 2px; /*arrendondar cantos*/
      cursor: pointer; /* cursor deixa 'clicável' */
      margin-right: 5px; /*cria uma margem na direita */
    }

    .join-{
      background-color: white;
      color: rgb(39, 164, 209);
      border-color: rgb(39, 164, 209);
      border-style: solid; /*deixa a cor da borda sólida */
      border-width: 1px; /* largura da borda*/
      border-radius: 2px;
      height: 36px;
      width: 60px;
      cursor: pointer;
    }

    .tweet-{
      background-color: rgb(39, 164, 209);
      color: white;
      height: 36px;
      width: 65px;
      border-color: rgb(39, 164, 209);
      border: none;
      border-radius: 18px;
      cursor: pointer;
      font-weight: bold; /*texto em negrito BOLD */
      font-size: 15px;
      margin-left: 8px;
    }

  </style>

  <button class="subscribe-">SUBSCRIBE</button>
  <button class="join-">JOIN</button>
  <button class="tweet-">Tweet</button>
